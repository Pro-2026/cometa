<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Cometa — Вход</title>
  <link rel="icon" type="image/svg+xml" href="comet.svg"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

<div class="auth-wrap">
  <div class="auth-box">
    <img src="comet.svg" class="comet-logo auth-logo" width="52" height="52" alt="Cometa"/>
    <h1 class="auth-heading">Cometa</h1>

    <div class="auth-tabs">
      <button class="auth-tab active" data-tab="login">Войти</button>
      <button class="auth-tab" data-tab="register">Регистрация</button>
    </div>

    <form class="auth-form" id="authForm" autocomplete="on">
      <input type="text" id="authUsername" class="auth-input" placeholder="Имя пользователя" autocomplete="username" required/>
      <input type="password" id="authPassword" class="auth-input" placeholder="Пароль" autocomplete="current-password" required/>
      <button type="submit" class="auth-submit" id="authSubmit">Войти</button>
      <p class="auth-error" id="authError"></p>
    </form>
  </div>
</div>

<script type="module">
import { auth, db } from './firebase-config.js';
import { signInAnonymously } from 'https://www.gstatic.com/firebasejs/10.14.1/firebase-auth.js';
import { doc, getDoc, setDoc } from 'https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore.js';

if (localStorage.getItem('cometa_theme') === 'light') document.body.classList.add('light');
if (localStorage.getItem('cometa_user')) window.location.href = 'index.html';

async function hashPass(pw) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(pw + 'cmt_2026'));
  return [...new Uint8Array(buf)].map(b => b.toString(16).padStart(2, '0')).join('');
}

const errEl     = document.getElementById('authError');
const submitBtn = document.getElementById('authSubmit');
let tab = 'login';

document.querySelectorAll('.auth-tab').forEach(btn => {
  btn.addEventListener('click', () => {
    tab = btn.dataset.tab;
    document.querySelectorAll('.auth-tab').forEach(b => b.classList.toggle('active', b === btn));
    submitBtn.textContent = tab === 'login' ? 'Войти' : 'Создать аккаунт';
    errEl.textContent = '';
  });
});

document.getElementById('authForm').addEventListener('submit', async e => {
  e.preventDefault();
  const username = document.getElementById('authUsername').value.trim();
  const password = document.getElementById('authPassword').value;
  if (!username || !password) return;

  errEl.textContent = '';
  submitBtn.disabled = true;
  submitBtn.textContent = '...';

  try {
    await signInAnonymously(auth);
    const hash    = await hashPass(password);
    const userRef = doc(db, 'users', username);

    if (tab === 'register') {
      const snap = await getDoc(userRef);
      if (snap.exists()) throw new Error('Имя уже занято');
      if (password.length < 4) throw new Error('Пароль минимум 4 символа');
      await setDoc(userRef, { password: hash, createdAt: Date.now() });
    } else {
      const snap = await getDoc(userRef);
      if (!snap.exists() || snap.data().password !== hash) throw new Error('Неверное имя или пароль');
    }

    localStorage.setItem('cometa_user', username);
    window.location.href = 'index.html';
  } catch (err) {
    errEl.textContent = err.message || 'Ошибка';
    submitBtn.disabled = false;
    submitBtn.textContent = tab === 'login' ? 'Войти' : 'Создать аккаунт';
  }
});
</script>
</body>
</html>
